services:

  # PHP + Laravel
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gestor_app
    volumes:
      - ./src:/var/www/src
    networks:
      - gestor_network
    depends_on:
      - mysql
      - redis

  # Servidor web
  nginx:
    image: nginx:alpine
    container_name: gestor_nginx
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/src
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - gestor_network
    depends_on:
      - app

  # Base de datos
  mysql:
    image: mysql:8.0
    container_name: gestor_mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-gestor_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-gestor}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - gestor_network

  # Cache y colas
  redis:
    image: redis:alpine
    container_name: gestor_redis
    ports:
      - "6379:6379"
    networks:
      - gestor_network

  # Assets (Vite)
  node:
    image: node:20-alpine
    container_name: gestor_node
    working_dir: /var/www/src
    volumes:
      - ./src:/var/www/src
    networks:
      - gestor_network
    command: sh -c "npm install && npm run dev"
    profiles:
      - dev

volumes:
  mysql_data:

networks:
  gestor_network:
    driver: bridge
